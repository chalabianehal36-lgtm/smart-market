<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits - Smart Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c1: #3b82f6;
      --c2: #10b981;
      --bg: #f0f9ff;
      --bg2: #e0f2fe;
      --surface: rgba(255,255,255,0.7);
      --surface2: rgba(255,255,255,0.4);
      --text: #0f172a;
      --text2: #475569;
      --border: rgba(255,255,255,0.5);
      --shadow: 0 8px 32px rgba(59,130,246,0.12);
      --radius: 20px;
    }
    body.dark {
      --bg: #0a0f1e;
      --bg2: #0d1526;
      --surface: rgba(15,23,42,0.85);
      --surface2: rgba(30,41,59,0.7);
      --text: #f1f5f9;
      --text2: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg2), var(--bg));
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: background 0.4s;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex-shrink: 0;
      text-decoration: none;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-box input {
      width: 200px;
      padding: 8px 36px 8px 14px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      backdrop-filter: blur(8px);
      font-size: 13px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: 0.3s;
      outline: none;
    }
    .search-box input::placeholder { color: var(--text2); }
    .search-box input:focus {
      width: 240px;
      border-color: var(--c1);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .search-box .search-icon {
      position: absolute;
      right: 11px;
      font-size: 14px;
      opacity: 0.5;
      pointer-events: none;
    }
    .nav-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      padding: 7px 14px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-btn:hover {
      background: var(--surface);
      border-color: var(--c1);
      color: var(--c1);
    }
    .cart-btn {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: white !important;
      border-color: transparent !important;
      font-weight: 600;
    }
    .cart-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,130,246,0.35);
      color: white !important;
    }
    select.nav-btn {
      appearance: none;
      padding-right: 18px;
      cursor: pointer;
    }
    /* زر الصفحة النشطة */
    .nav-btn.active-page {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: white !important;
      border-color: transparent !important;
      font-weight: 600;
    }
    .nav-btn.active-page:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,130,246,0.35);
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
    }
    .hamburger span {
      display: block; width: 20px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 64px;
      left: 0; right: 0;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      z-index: 9999;
      flex-direction: column;
      gap: 10px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu .search-box { width: 100%; }
    .mobile-menu .search-box input { width: 100% !important; }
    .mobile-menu .nav-btn { justify-content: center; text-align: center; }
    .mobile-menu-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
    }
    .mobile-menu-row .nav-btn { flex: 1; justify-content: center; }
    #authAreaMobile {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    #authAreaMobile .nav-btn { width: 100%; justify-content: center; }
    #authAreaMobile .user-menu { width: 100%; position: relative; }
    #authAreaMobile .avatar-circle {
      width: 100%;
      border-radius: 50px;
      height: 38px;
      font-size: 14px;
      gap: 8px;
      justify-content: center;
      border: 1.5px solid var(--border);
    }
    #authAreaMobile .dropdown {
      position: absolute;
      bottom: 46px;
      top: auto;
      right: 0;
      left: 0;
      min-width: unset;
      width: 100%;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      background: linear-gradient(135deg, var(--c1) 0%, #6366f1 50%, var(--c2) 100%);
      padding: 48px 32px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: -200px; right: -100px;
      pointer-events: none;
    }
    .page-header::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      bottom: -120px; left: -80px;
      pointer-events: none;
    }
    .page-header-content { position: relative; z-index: 1; }
    .page-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }
    .page-header p {
      font-size: 15px;
      opacity: 0.88;
    }

    /* ===== FILTERS ===== */
    .filters-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 28px 32px 8px;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 10px 20px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: 0.2s;
      box-shadow: var(--shadow);
      appearance: none;
      padding-right: 24px;
    }
    .filter-select:focus, .filter-select:hover {
      border-color: var(--c1);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      text-align: center;
      margin: 32px 0 20px;
      font-size: clamp(20px, 3vw, 26px);
      font-weight: 700;
      color: var(--text);
    }
    .section-title span {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== MASONRY GRID ===== */
    .products {
      columns: 4;
      column-gap: 20px;
      padding: 0 32px 60px;
    }

    /* ===== PRODUCT CARD ===== */
    .product-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: var(--shadow);
      display: inline-block;   /* ضروري لـ columns */
      width: 100%;
      margin-bottom: 20px;
      break-inside: avoid;
      animation: fadeInUp 0.5s ease both;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 56px rgba(59,130,246,0.2);
      border-color: rgba(59,130,246,0.35);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .product-img-wrap {
      position: relative;
      overflow: hidden;
    }
    .product-card img {
      width: 100%;
      height: auto;        /* الارتفاع الطبيعي للصورة */
      display: block;
      transition: 0.4s;
    }
    .product-card:hover img { transform: scale(1.06); }
    .badge {
      position: absolute;
      top: 12px; left: 12px;
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: white;
      padding: 4px 10px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .product-info {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-info h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }
    .product-info .price {
      font-size: 15px;
      font-weight: 700;
      color: var(--c2);
    }
    .product-info button {
      padding: 9px 16px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: white;
      font-weight: 600;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: 0.25s;
    }
    .product-info button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.35);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text2);
      break-inside: avoid;
    }
    .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 16px; }

    /* ===== AVATAR / DROPDOWN ===== */
    .user-menu { position: relative; }
    .avatar-circle {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.5);
      flex-shrink: 0;
    }
    .dropdown {
      position: absolute;
      top: 46px; right: 0;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1.5px solid var(--border);
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      min-width: 160px;
      z-index: 9999;
    }
    .dropdown p {
      padding: 4px 8px 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .dropdown button {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .dropdown button:hover {
      background: rgba(59,130,246,0.1);
      color: var(--c1);
    }
    .hidden { display: none !important; }

    /* ===== FOOTER ===== */
    .footer {
      background: #0f172a;
      color: rgba(255,255,255,0.55);
      text-align: center;
      padding: 28px 20px;
      font-size: 13px;
    }
    .footer strong { color: rgba(255,255,255,0.85); font-weight: 600; }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 769px) {
      .hamburger { display: none !important; }
      .mobile-menu { display: none !important; }
    }
    @media (max-width: 1024px) {
      .products { columns: 2; }
    }
    @media (max-width: 768px) {
      .navbar { padding: 0 16px; }
      .navbar .search-box,
      .navbar #navHome,
      .navbar #navProducts,
      .navbar #authArea,
      .navbar #langSwitcher,
      .navbar .dark-toggle { display: none !important; }
      .navbar .cart-btn { display: flex !important; }
      .hamburger { display: flex !important; }
      .page-header { padding: 36px 20px; }
      .filters-bar { padding: 20px 16px 4px; }
      .products {
        columns: 2;
        column-gap: 14px;
        padding: 0 16px 40px;
      }
      .product-card { margin-bottom: 14px; }
    }
    @media (max-width: 480px) {
      .products { columns: 1; }
      .page-header h1 { font-size: 22px; }
    }
  </style>
</head>

/* ===== STATE ===== */
let allProducts = [];

/* ===== MOBILE MENU ===== */
function toggleMobileMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}

/* ===== DROPDOWN ===== */
function toggleMenu(dropdownId) {
  document.querySelectorAll('.dropdown').forEach(d => {
    if (d.id !== dropdownId) d.classList.add('hidden');
  });
  document.getElementById(dropdownId)?.classList.toggle('hidden');
}
function logout() { localStorage.removeItem("user"); window.location.reload(); }
function goProfile() { window.location.href = "profile.html"; }

document.addEventListener("click", function(e) {
  if (!e.target.closest('.user-menu')) {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.add('hidden'));
  }
  if (!e.target.closest('.hamburger') && !e.target.closest('.mobile-menu')) {
    document.getElementById('mobileMenu').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }
});

/* ===== AUTH UI ===== */
function updateAuthUI() {
  const user = JSON.parse(localStorage.getItem("user"));
  const lang = localStorage.getItem('lang') || 'fr';
  const t = translations[lang];

  ['authArea', 'authAreaMobile'].forEach((id, i) => {
    const area = document.getElementById(id);
    if (!area) return;
    const dropId = i === 0 ? 'dropdownDesktop' : 'dropdownMobile';
    if (user) {
      const letter = user.name.charAt(0).toUpperCase();
      const isMobile = i === 1;
      area.innerHTML = `
        <div class="user-menu" ${isMobile ? 'style="width:100%;position:relative;"' : ''}>
          <div class="avatar-circle"
            onclick="toggleMenu('${dropId}')"
            ${isMobile ? 'style="width:100%;border-radius:50px;height:38px;font-size:14px;gap:8px;"' : ''}>
            ${letter}${isMobile ? ' ' + user.name : ''}
          </div>
          <div id="${dropId}" class="dropdown hidden">
            <p>${user.name}</p>
            <button onclick="goProfile()">${t.profileBtn}</button>
            <button onclick="logout()">${t.logoutBtn}</button>
          </div>
        </div>`;
      const avatar = area.querySelector('.avatar-circle');
      if (avatar) avatar.style.background = localStorage.getItem("avatarTheme") || "linear-gradient(135deg,#3b82f6,#10b981)";
    } else {
      area.innerHTML = `<a href="login.html" class="nav-btn" ${i===1?'style="width:100%;justify-content:center;"':''}>${t.navLogin}</a>`;
    }
  });
}

/* ===== LANGUAGE ===== */
function applyLanguage(lang) {
  const t = translations[lang];
  const ct = categoriesTranslations[lang];

  document.getElementById("navHome").innerText = t.navHome;
  document.getElementById("navProducts").innerText = t.navProducts;
  const hm = document.getElementById("navHomeMobile");
  const pm = document.getElementById("navProductsMobile");
  if (hm) hm.innerText = "🏠 " + t.navHome;
  if (pm) pm.innerText = "📦 " + t.navProducts;

  document.getElementById("searchInput").placeholder = t.searchPlaceholder;
  const sm = document.getElementById("searchInputMobile");
  if (sm) sm.placeholder = t.searchPlaceholder;

  document.getElementById("pageTitle").innerText = t.pageTitle;
  document.getElementById("pageSubtitle").innerText = t.pageSubtitle;
  document.getElementById("sectionTitle").innerHTML = t.sectionTitle;

  const sel = document.getElementById("categoryFilter");
  sel.options[0].text = ct.all;
  sel.options[1].text = ct.electronique;
  sel.options[2].text = ct.mode;
  sel.options[3].text = ct.maison;
  sel.options[4].text = ct.local;

  document.body.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
}

function changeLanguage() {
  const lang = document.getElementById("langSwitcher").value;
  const mob = document.getElementById("langSwitcherMobile");
  if (mob) mob.value = lang;
  localStorage.setItem('lang', lang);
  applyLanguage(lang);
  updateAuthUI();
  displayProducts(allProducts.filter(p => {
    const sel = document.getElementById("categoryFilter").value;
    return sel === "all" || p.category === sel;
  }));
}

function changeLangMobile() {
  const lang = document.getElementById("langSwitcherMobile").value;
  document.getElementById("langSwitcher").value = lang;
  localStorage.setItem('lang', lang);
  applyLanguage(lang);
  updateAuthUI();
}

/* ===== CART ===== */
function addCart(name, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let existing = cart.find(i => i.name === name);
  if (existing) { existing.quantity++; } else { cart.push({ name, price, quantity: 1 }); }
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  showToast(name + " أُضيف إلى السلة 🛒");
}
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const total = cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartCount').innerText = total;
  const mob = document.getElementById('cartCountMobile');
  if (mob) mob.innerText = total;
}

/* ===== TOAST ===== */
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
      background:linear-gradient(135deg,#3b82f6,#10b981);color:white;
      padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:9999;
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      font-family:'Inter',sans-serif;white-space:nowrap;
    `;
    document.body.appendChild(toast);
  }
  toast.innerText = msg;
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { toast.style.transform = 'translateX(-50%) translateY(80px)'; }, 2800);
}

/* ===== DARK MODE ===== */
function toggleDarkMode() {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark") ? "true" : "false");
}

/* ===== DISPLAY PRODUCTS ===== */
function displayProducts(list) {
  const container = document.getElementById("productsContainer");
  const lang = localStorage.getItem("lang") || "fr";
  const t = translations[lang];
  container.innerHTML = "";

  if (list.length === 0) {
    container.style.columns = "1";
    container.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">🔍</span>
        <p>${t.empty}</p>
      </div>`;
    return;
  }
  container.style.columns = "";

  const badges = ["Nouveau", "Promo", "Top"];
  list.forEach((p, idx) => {
    let productName = p.name;
    if (lang !== "fr" && translatedNames[p.name]) {
      productName = translatedNames[p.name][lang] || p.name;
    }
    const badge = badges[idx % badges.length];
    const card = document.createElement("div");
    card.className = "product-card";
    card.style.animationDelay = (idx * 0.05) + "s";
    card.innerHTML = `
      <div class="product-img-wrap">
        <div class="badge">${badge}</div>
        <img src="${p.image}" alt="${productName}" loading="lazy">
      </div>
      <div class="product-info">
        <h4>${productName}</h4>
        <p class="price">${Number(p.price).toLocaleString()} DA</p>
        <button onclick="event.stopPropagation();addCart('${p.name}',${p.price})">${t.addCart}</button>
      </div>`;
    card.addEventListener("click", () => { window.location.href = "product.html?id=" + p.id; });
    container.appendChild(card);
  });
}

/* ===== URL HELPERS ===== */
function getURLParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

/* ===== SEARCH ===== */
function setupSearch(inputId) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  inp.addEventListener("keypress", e => {
    if (e.key === "Enter" && inp.value.trim()) {
      window.location.href = "products.html?search=" + encodeURIComponent(inp.value.trim());
    }
  });
  // live filter
  inp.addEventListener("input", () => {
    const q = inp.value.trim().toLowerCase();
    const sel = document.getElementById("categoryFilter").value;
    let filtered = allProducts;
    if (sel !== "all") filtered = filtered.filter(p => p.category === sel);
    if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
    displayProducts(filtered);
  });
}

/* ===== INIT ===== */
window.addEventListener("DOMContentLoaded", () => {
  // Theme colors
  document.documentElement.style.setProperty('--c1', localStorage.getItem('themeC1') || '#3b82f6');
  document.documentElement.style.setProperty('--c2', localStorage.getItem('themeC2') || '#10b981');

  if (localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");

  const lang = localStorage.getItem("lang") || "fr";
  document.getElementById("langSwitcher").value = lang;
  const mob = document.getElementById("langSwitcherMobile");
  if (mob) mob.value = lang;

  applyLanguage(lang);
  updateCartCount();
  updateAuthUI();
  setupSearch("searchInput");
  setupSearch("searchInputMobile");

  // Load products
  fetch("getProducts.php")
    .then(res => res.json())
    .then(data => {
      allProducts = data;
      const categoryFromURL = getURLParam("category");
      const searchFromURL   = getURLParam("search");
      let filtered = allProducts;
      if (categoryFromURL) {
        filtered = filtered.filter(p => p.category === categoryFromURL);
        document.getElementById("categoryFilter").value = categoryFromURL;
      }
      if (searchFromURL) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchFromURL.toLowerCase()));
        document.getElementById("searchInput").value = searchFromURL;
      }
      displayProducts(filtered);
    })
    .catch(() => {
      const container = document.getElementById("productsContainer");
      container.style.columns = "1";
      container.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">⚠️</span>
          <p>Erreur de chargement des produits</p>
        </div>`;
    });

  // Category filter
  document.getElementById("categoryFilter").addEventListener("change", function() {
    const val = this.value;
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    let filtered = val === "all" ? allProducts : allProducts.filter(p => p.category === val);
    if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
    displayProducts(filtered);
  });
});
</script>
